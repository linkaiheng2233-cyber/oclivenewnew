# 未在 [scene_bindings] 中出现的场景 id 使用 default_profile 对应策略；新场景只需角色包目录即可生效。
default_profile = "default"

[default]
emotion = { neutral_hold_enabled = true, low_confidence_hold_threshold = 0.6 }
memory = { ignore_single_char_filter = true, default_importance = 0.5, fifo_limit = 500 }

[profiles.conservative]
emotion = { neutral_hold_enabled = true, low_confidence_hold_threshold = 0.7 }
memory = { ignore_single_char_filter = true, default_importance = 0.45, fifo_limit = 500 }

[profiles.exploratory]
emotion = { neutral_hold_enabled = false, low_confidence_hold_threshold = 0.5 }
memory = { ignore_single_char_filter = false, default_importance = 0.55, fifo_limit = 700 }

[scene_bindings]
home = "conservative"
school = "exploratory"
company = "exploratory"
park = "conservative"
